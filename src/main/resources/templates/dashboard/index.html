<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layouts/main :: layout(~{::main})}">
<head>
    <title>Dashboard</title>
</head>
<body>

<main>
    <h3>Dashboard</h3>
    <div class="container py-5">
        <div class="row row-cols-1 row-cols-md-4 g-4">
            <div class="col">
                <div class="card h-100 text-center shadow">
                    <div class="card-body">
                        <div class="display-4 text-primary mb-2">
                            <i class="bi bi-people"></i>
                        </div>
                        <h2 class="card-title mb-3"><span th:text="${countPatients}"></span></h2>
                        <p class="card-text text-muted">Patients</p>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 text-center shadow">
                    <div class="card-body">
                        <div class="display-4 text-success mb-2">
                            <i class="bi bi-file-medical"></i>
                        </div>
                        <h2 class="card-title mb-3"><span th:text="${countConsultations}"></span></h2>
                        <p class="card-text text-muted">Consultations</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
